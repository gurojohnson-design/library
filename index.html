<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<!-- form to present to user to collect info-->
    <div id="myForm">
        <form action="" method="post">

            <label for="title">Book Title:</label>
            <input type="text" name="title" id="title">

            <label for="author">Author:</label>
            <input type="text" name="author" id="author">

            <label for="pages">Number of Pages:</label>
            <input type="number" name="pages" id="pages">

            <label for="read">Have you read this book?</label>
            <input type="checkbox" name="read" id="read">

            <label for="rating">Rating:</label>
            <input type="range" min="0" max="5" step="1" value="0" name="rating" id="rating" oninput="this.nextElementSibling.value = this.value"   >
            <output id="bookRating">0</output>

            <label for="notes">Notes:</label>
            <input type="textarea" name="notes" id="notes">
        </form>
    </div>


    <script src="script.js"></script>
</body>
</html>
